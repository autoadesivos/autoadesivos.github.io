<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Catálogos</title>
  <style>
    :root {
      --bg: #0f1115;
      --card: #171a21;
      --text: #f5f7fb;
      --muted: #aeb6c5;
      --border: #2a3040;
      --hover: #202635;
      --shadow: 0 12px 30px rgba(0, 0, 0, 0.35);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at top, rgba(255,255,255,0.06), transparent 30%),
        linear-gradient(180deg, #11141a 0%, #0b0d12 100%);
      color: var(--text);
    }

    .card {
      width: 100%;
      max-width: 420px;
      background: rgba(23, 26, 33, 0.92);
      border: 1px solid var(--border);
      border-radius: 24px;
      box-shadow: var(--shadow);
      padding: 28px;
      backdrop-filter: blur(8px);
    }

    .eyebrow {
      margin: 0 0 18px;
      text-align: center;
      font-size: 13px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .title {
      margin: 0 0 22px;
      text-align: center;
      font-size: 28px;
      font-weight: 800;
      letter-spacing: 0.04em;
    }

    .links {
      display: grid;
      gap: 14px;
    }

    .link {
      display: flex;
      align-items: center;
      gap: 14px;
      text-decoration: none;
      color: var(--text);
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 16px 18px;
      transition: transform 0.18s ease, background 0.18s ease, border-color 0.18s ease;
    }

    .link:hover {
      transform: translateY(-2px);
      background: var(--hover);
      border-color: #3b455c;
    }

    .icon {
      width: 42px;
      height: 42px;
      flex: 0 0 42px;
      display: grid;
      place-items: center;
      border-radius: 12px;
      background: #0f131b;
      border: 1px solid var(--border);
      font-size: 20px;
    }

    .label-wrap {
      min-width: 0;
      flex: 1;
    }

    .label {
      display: block;
      font-size: 16px;
      font-weight: 700;
      letter-spacing: 0.04em;
    }

    .sub {
      display: block;
      margin-top: 3px;
      color: var(--muted);
      font-size: 13px;
    }

    .arrow {
      color: var(--muted);
      font-size: 18px;
    }

    .footer {
      margin-top: 18px;
      text-align: center;
      color: var(--muted);
      font-size: 12px;
    }
  </style>
</head>
<body>
  <main class="card">
    <p class="eyebrow">Links rápidos</p>
    <h1 class="title">CATÁLOGOS</h1>

    <section class="links">
      <a class="link" href="https://discord.gg/SEUCODIGO" target="_blank" rel="noopener noreferrer">
        <span class="icon" aria-hidden="true">🎮</span>
        <span class="label-wrap">
          <span class="label">DISCORD</span>
          <span class="sub">Entre pelo convite</span>
        </span>
        <span class="arrow" aria-hidden="true">↗</span>
      </a>

      <a class="link" href="https://t.me/SEUUSUARIO" target="_blank" rel="noopener noreferrer">
        <span class="icon" aria-hidden="true">✈️</span>
        <span class="label-wrap">
          <span class="label">TELEGRAM</span>
          <span class="sub">Fale por mensagem</span>
        </span>
        <span class="arrow" aria-hidden="true">↗</span>
      </a>

      <a class="link" href="https://wa.me/5511999999999" target="_blank" rel="noopener noreferrer">
        <span class="icon" aria-hidden="true">💬</span>
        <span class="label-wrap">
          <span class="label">WHATSAPP</span>
          <span class="sub">Atendimento direto</span>
        </span>
        <span class="arrow" aria-hidden="true">↗</span>
      </a>
    </section>

    <div class="footer">Troque os links pelos seus antes de publicar.</div>
  </main>
</body>
</html>
